# Argos Third-Party Tool Containers - Portainer Compatible
# Argos app runs natively on the host. Only third-party tools use Docker.
#
# Deploy this in Portainer as a Stack
#
# Usage:
#   docker compose -f docker/docker-compose.portainer-dev.yml --profile tools up -d openwebrx
#   docker compose -f docker/docker-compose.portainer-dev.yml --profile tools up -d bettercap

services:

  # ============================================
  # OPENWEBRX - SDR Web Interface (HackRF)
  # On-demand only: started by Argos Tools panel
  # ============================================
  openwebrx:
    image: slechev/openwebrxplus:latest
    container_name: openwebrx-hackrf
    profiles: ["tools"]
    mem_limit: 512m
    memswap_limit: 768m
    ports:
      - "8073:8073"
    environment:
      - OPENWEBRX_ADMIN_USER=admin
      - OPENWEBRX_ADMIN_PASSWORD=${OPENWEBRX_PASSWORD:?Set OPENWEBRX_PASSWORD in .env}
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    privileged: true
    volumes:
      - openwebrx-hackrf-settings:/var/lib/openwebrx
    tmpfs:
      - /tmp/openwebrx:rw,noexec,nosuid,size=100m
    networks:
      - argos-dev-network
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================
  # NOVASDR - Rust WebSDR (HackRF, CPU-only FFT)
  # On-demand only: started by Argos Tools panel
  # Shares HackRF with openwebrx-hackrf via soft
  # interlock in /api/{novasdr,openwebrx}/control.
  # ============================================
  novasdr:
    build:
      context: ./novasdr
      dockerfile: Dockerfile
      args:
        NOVASDR_REF: "0.3.7"
    image: argos-novasdr:0.3.7
    container_name: novasdr-hackrf
    profiles: ["tools"]
    mem_limit: 768m
    memswap_limit: 1g
    ports:
      - "9002:9002"
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    privileged: true
    # The non-root `argos` user inside the image needs plugdev to open
    # /dev/bus/usb/NNN/NNN (crw-rw---- root:plugdev). `privileged: true`
    # grants all capabilities but does NOT attach supplementary groups —
    # Docker only applies the gid from /etc/passwd unless group_add is set.
    group_add:
      - plugdev
    volumes:
      # Read-write: NovaSDR atomically persists a migrated config back to disk
      # on every start-up (adds any fields added in newer schema versions).
      # Bind-mounting rw means the host copy stays in sync and is git-trackable.
      - ./novasdr/config:/config:rw
    tmpfs:
      - /tmp/novasdr:rw,noexec,nosuid,size=100m
    networks:
      - argos-dev-network
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================
  # BETTERCAP - WiFi/BLE/Network Recon
  # On-demand only: started by Argos Tools panel
  # ============================================
  bettercap:
    image: bettercap/bettercap:latest
    container_name: bettercap
    profiles: ["tools"]
    mem_limit: 256m
    memswap_limit: 384m
    network_mode: host
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - BETTERCAP_API_USER=${BETTERCAP_USER:-admin}
      - BETTERCAP_API_PASSWORD=${BETTERCAP_PASSWORD:?Set BETTERCAP_PASSWORD in .env}
    command: bettercap -api-rest-address 0.0.0.0 -api-rest-port 8081
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================
  # TRUNK-RECORDER - P25 / SmartNet trunked radio
  # recorder (Cellular & Trunked Radio Interception)
  # Spawned on-demand by Argos control endpoint.
  # Exclusively holds the HackRF while running.
  # ============================================
  trunk-recorder:
    image: robotastic/trunk-recorder:latest
    container_name: trunk-recorder
    profiles: ["tools"]
    mem_limit: 768m
    memswap_limit: 1g
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    privileged: true
    working_dir: /app
    volumes:
      # Argos writes config.json + talkgroups.csv here from the active preset.
      # Host bind — Argos service layer writes to TRUNK_RECORDER_CONFIG_DIR.
      - /var/lib/argos/trunk-recorder:/app/config:rw
      # Shared recordings volume — rdio-scanner reads the same WAV+JSON pairs.
      - /var/lib/argos/recordings:/app/recordings:rw
    entrypoint: ["/bin/sh", "-c"]
    command: ["trunk-recorder --config=/app/config/config.json"]
    networks:
      - argos-dev-network
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================
  # RDIO-SCANNER - Go web UI for trunked call
  # playback. Ingests calls from trunk-recorder
  # via its rdioscanner_uploader plugin. Persistent
  # across trunk-recorder start/stop cycles so the
  # operator can replay archived calls.
  # ============================================
  rdio-scanner:
    image: chuot/rdio-scanner:latest
    container_name: rdio-scanner
    profiles: ["tools"]
    mem_limit: 384m
    memswap_limit: 512m
    ports:
      - "3002:3000"
    volumes:
      # Persistent SQLite DB with call metadata + admin config.
      - rdio-scanner-data:/app/data:rw
      # Shared recordings volume (read-only for rdio-scanner).
      - /var/lib/argos/recordings:/app/recordings:ro
    networks:
      - argos-dev-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================
  # JAEGER - Distributed tracing backend
  # Always-on: receives OTel traces from Argos
  # UI: http://localhost:16686
  # OTLP ingest: localhost:4318
  # ============================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    profiles: ["observability"]
    mem_limit: 384m
    memswap_limit: 448m
    mem_reservation: 128m
    oom_score_adj: 800
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - MEMORY_MAX_TRACES=5000
    networks:
      - argos-dev-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "2"

networks:
  argos-dev-network:
    driver: bridge
    name: argos-dev-network

volumes:
  openwebrx-hackrf-settings:
  rdio-scanner-data:
