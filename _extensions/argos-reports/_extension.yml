title: Argos Reports
author: Argos
version: 1.0.0
quarto-required: '>=1.8.0'
contributes:
  formats:
    html:
      embed-resources: true
      theme: [darkly, argos-html.scss]
      toc: false
      fig-cap-location: bottom
      filters:
        - banner.lua
    typst:
      filters:
        - banner.lua
    revealjs:
      theme: [dark, argos-revealjs.scss]
      slide-number: true
      menu:
        side: left
      controls: true
      filters:
        - banner.lua
