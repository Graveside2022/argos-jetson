# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
  # Disable background daemon globally. Daemon auto-applies formatter
  # fixes to the working tree on file-system events, which interferes
  # with atomic commits and introduces out-of-scope changes. All trunk
  # invocations run in one-shot mode instead.
  options:
    - commands: [ALL]
      args: --monitor=false
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    - eslint
    - oxipng
    - black
    - isort
  enabled:
    - actionlint@1.7.12
    - markdownlint@0.48.0
    - ruff@0.15.11
    - shellcheck@0.11.0
    - yamllint@1.38.0
    - gitleaks@8.30.1
    - prettier@3.8.3
    - renovate@43.139.0
    - shfmt@3.6.0
    - svgo@4.0.1
    - taplo@0.10.0
  ignore:
    - linters: [ALL]
      paths:
        - build/**
        - .svelte-kit/**
        - node_modules/**
        - coverage/**
        - _bmad-output/**
        - graphify-out/**
        - tactical/blue-dragon/**
        - static/webtak/**
        - package-lock.json
        - '**/*.min.js'
        - '**/*.min.css'
actions:
  enabled:
    - trunk-upgrade-available
