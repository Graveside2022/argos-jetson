# .github/workflows/trunk.yml
#
# Trunk Code Quality — annotates new lint issues on PRs (hold-the-line).
# Does NOT block on existing debt; existing 3562 baseline issues are ignored.
# Only new issues on changed lines (relative to main) produce annotations.
#
# Install + config: .trunk/trunk.yaml + .trunk/configs/
# Linters active: actionlint, gitleaks, markdownlint, prettier, renovate,
# ruff, shellcheck, shfmt, svgo, taplo, yamllint.

name: 'CI: Trunk Code Quality'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trunk-check:
    name: Trunk Check (new issues only)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          # Trunk needs full history to compute hold-the-line diffs against main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Trunk Check (hold-the-line)
        # Direct CLI invocation — do NOT use trunk-io/trunk-action@v1.
        # The action auto-creates a separate "Trunk Check" check-run that
        # fails independently of this workflow's conclusion, blocking merge
        # on the bootstrap PR where main has no .trunk/trunk.yaml baseline.
        # Direct CLI gives us full control over the exit-status surface.
        #
        # `|| true` makes this informational during adoption. Remove in a
        # follow-up PR once trunk config is on main and a real baseline exists.
        run: |
          npx trunk check --no-progress --ci --upstream=origin/main --output-file=/tmp/trunk-pr.json || true
          issues=$(jq '.issues | length' /tmp/trunk-pr.json 2>/dev/null || echo 0)
          echo "::notice::Trunk check reported $issues findings in PR diff (informational during adoption)"
