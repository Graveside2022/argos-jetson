name: Danger

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write # post review comments
  issues: write # post review comments

jobs:
  danger:
    name: PR shape rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # SHA-pinned to the repo-canonical version (matches ci.yml / lint.yml /
        # fallow.yml / trunk.yml). checkout + setup-node handle credentials and
        # run early, so they are SHA-pinned fleet-wide; only low-risk first-party
        # actions (e.g. upload-artifact) use version tags.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc # pin to repo Node (was floating lts/*)
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Danger
        run: npx danger ci --failOnErrors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
