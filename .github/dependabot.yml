# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/keeping-your-actions-up-to-date-with-dependabot
#
# Keeps GitHub Actions SHA pins fresh. Grouped so all Action bumps
# land in ONE weekly PR instead of one per action.
version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      github-actions:
        patterns: ['*']
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
