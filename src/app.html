<!doctype html>
<!-- fallow-ignore-file unresolved-import -->
<!--
  fallow's HTML parser flags <link href="/fonts/..."> as module imports,
  but they are runtime URL refs to static/fonts/* (served by SvelteKit's
  static adapter). The static/** dir is already in ignorePatterns, but
  fallow still walks app.html link tags and reports them as unresolved.
  File-wide suppression keeps app.html green without losing real coverage
  elsewhere.
-->
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<!-- Theme FOUC prevention — runs synchronously before first paint -->
		<script>
			try {
				var t = JSON.parse(localStorage.getItem('argos-theme') || '{}');
				if (t.palette) document.documentElement.dataset.palette = t.palette;
			} catch (e) {
				/* dark class already set on <html> */
			}
		</script>
		<!-- Critical CSS - FOUC prevention only -->
		<style>
			body {
				background-color: #111111;
				color: #ffffff;
				font-family: 'Geist', system-ui, sans-serif;
			}
			/* V3 (port 5175) pre-paint surfaces — the <body>-top script below
			   sets data-ui/data-mode before paint, so these higher-specificity
			   rules win over the generic `body` rule and the white/black canvas
			   never flashes. Inert for V1/V2 — their <body> never carries
			   data-ui="v3". */
			body[data-ui='v3'][data-mode='light'] {
				background-color: #ffffff;
				color: #000000;
			}
			body[data-ui='v3'][data-mode='dark'] {
				background-color: #000000;
				color: #ffffff;
			}
		</style>

		<!-- Geist Sans for UI navigation chrome -->
		<link rel="stylesheet" href="/fonts/geist.css" />
		<!-- FiraCode Nerd Font for terminal rendering with Nerd Font glyphs -->
		<link rel="stylesheet" href="/fonts/firacode-nerd-font.css" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			/* V3 (port 5175) pre-paint theme stamp. Runs only on /dashboard/v3
			   routes; sets the data attributes the [data-ui='v3'] CSS keys off
			   so dark/light + accent are correct at first paint. Inert on
			   :5173/:5174 — they never serve a /dashboard/v3 path. */
			try {
				if (location.pathname.indexOf('/dashboard/v3') === 0) {
					var v3t = JSON.parse(localStorage.getItem('argos-v3-theme') || '{}');
					var v3d = document.body.dataset;
					v3d.ui = 'v3';
					v3d.mode = v3t.mode === 'dark' ? 'dark' : 'light';
					v3d.palette = v3t.palette || 'nvidia';
				}
			} catch (e) {
				/* localStorage blocked — the V3 store applies its defaults on init */
			}
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
